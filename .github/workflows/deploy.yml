name: Deploy Content Studio

on:
  push:
    branches: [main]
    paths:
      - 'packages/content-pipeline/**'
      - 'packages/content-studio-frontend/**'
      - 'deploy/**'
      - 'Dockerfile'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 162.240.13.51
          port: 22022
          username: deployer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: bash /opt/content-studio/repo/deploy/deploy.sh
          script_stop: true
          timeout: 300s
