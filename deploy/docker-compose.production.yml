version: '3.8'

services:
  content-studio:
    build:
      context: ../packages/content-pipeline
      dockerfile: Dockerfile
    container_name: content-studio
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - STUDIO_ENV=production
      - ALLOWED_ORIGINS=https://studio.salkmedical.com
    volumes:
      - studio-data:/app/data
      - studio-uploads:/app/uploads
      - studio-settings:/app/settings
      - studio-logs:/app/output/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  studio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/content-studio/data
  studio-uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/content-studio/uploads
  studio-settings:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/content-studio/settings
  studio-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/content-studio/logs
