content_templates:
  LEV:
    tutorial_operacao:
      titulo: "Como operar o Foco Cirurgico LEV"
      duracao: "2-3 min"
      formato: "Video"
      canal_primario: "YouTube"
      canal_secundario: "WhatsApp"
      topicos:
        - "Ligando e ajustando intensidade"
        - "Movimentando as 5 articulacoes"
        - "Ajustando foco (spot) e diametro"
        - "Controle capacitivo (touch)"
        - "Modo COMMAND (se integrado)"
    guia_manutencao:
      titulo: "Manutencao Preventiva LEV"
      formato: "PDF"
      limpeza: "Apos cada uso - pano macio com desinfetante neutro"
      calibracao: "Semestral - luximetro, contatar AT se < 90%"
      verificacoes: "Mensal - articulacoes, bateria, cabos"
      bateria: "Recarga quando < 20%, leva 2-4,5h"
    faq_pos_instalacao:
      - q: "Quanto dura a bateria?"
        a: "3LEV ~5h, 4LEV ~8h continuo. Recarga 2-4,5h."
      - q: "Posso usar durante recarga?"
        a: "Nao recomendado."
      - q: "Temperatura de cor?"
        a: "4.500K fixo, Ra=99."
      - q: "Compativel com COMMAND?"
        a: "Sim, modelos M1LEC."
      - q: "Vida util LEDs?"
        a: "226.000 horas (~10 anos)."
      - q: "Como limpar?"
        a: "Pano macio + desinfetante neutro. Nunca abrasivos."
    checklist_instalacao:
      pre:
        - "Fixacao teto (carga min. 50kg)"
        - "Altura teto min 2,80m"
        - "Ponto energia (bivolt)"
        - "Modelo e acessorios conforme NF"
      pos:
        - "Testar 5 articulacoes"
        - "Medir intensidade luminosa"
        - "Ciclo bateria completo"
        - "Integracao COMMAND (se aplicavel)"
        - "Treinar equipe"
        - "Registrar n serie + data"

