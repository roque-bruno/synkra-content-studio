# Configuração de Estratégia de Conteúdo — Week Orchestrator
# Editável via UI Recursos > Estratégia Conteúdo
# Alimenta: week_orchestrator.py (WeekOrchestrator)
# Recalibrado: 2026-04-07 — Auditoria IC (Story 14.2)

pillar_weights:
  salk:
    # Pilares redesenhados para mapear 7 fases da jornada de compra hospitalar
    # Fonte: AUDITORIA_CONTENT_STUDIO_vs_IC.md — ISSUE #3 + ISSUE #4
    awareness_produto: 18       # Fase 1 (Identificação) — Hero shots, specs visuais
    educacional_specs: 22       # Fases 2-3 (Planejamento/Especificação) — Datasheets, demos, comparativos
    cases_social_proof: 18      # Fase 5 (Avaliação) — Instalações, depoimentos, referências
    tco_roi_licitacao: 18       # Fases 4,6 (Cotação/Decisão) — TCO, ROI, docs licitação, comparativo financeiro
    pos_venda_suporte: 9        # Fase 7 (Pós-compra) — Tutoriais, manuais, FAQ, contato AT
    datas_comemorativas: 10     # Transversal — Datas sazonais, homenagens, efemérides do setor saúde (13+ datas/ano)
    institucional: 5            # Transversal — Grupo, fabricação nacional, employer branding
    # COMMAND reduzido de 15%→0% como pilar — absorvido por awareness_produto quando relevante
  mendel:
    produto_tecnico: 35
    engenharia: 30
    certificacoes: 20
    bastidores: 15
  manager-grupo:
    cultura: 35
    inovacao: 25
    pessoas: 25
    institucional: 15

active_products:
  salk:
    - lev
    - kratus
    - ostus
    - kronus
  mendel:
    - lev
    - kratus
    - ostus
    - kronus
  manager-grupo: []
  dayho: []

pillar_personas:
  # Salk — Pilares mapeados por jornada de compra (Story 14.2)
  # Priorizacao IC: Eng.Clinica 40%, Compras 30%, Equipe Medica 20%, Admin 10% (Story 14.5)
  awareness_produto:           # Fase 1 — Identificação de necessidade
    primary: eng_clinica       # 60% das compras iniciam aqui
    secondary:
      - equipe_medica
      - admin_hospitalar
  educacional_specs:           # Fases 2-3 — Planejamento + Especificação técnica
    primary: eng_clinica
    secondary:
      - compras
  cases_social_proof:          # Fase 5 — Avaliação
    primary: admin_hospitalar
    secondary:
      - compras
      - eng_clinica
  tco_roi_licitacao:           # Fases 4,6 — Cotação + Decisão
    primary: compras
    secondary:
      - admin_hospitalar
      - eng_clinica
  pos_venda_suporte:           # Fase 7 — Pós-compra
    primary: eng_clinica
    secondary:
      - equipe_medica
  datas_comemorativas:           # Transversal — datas sazonais do setor
    primary: eng_clinica
    secondary:
      - equipe_medica
      - admin_hospitalar
  institucional:               # Transversal
    primary: admin_hospitalar
    secondary:
      - compras
  # Mendel — Mantém estrutura atual (fabricante/técnico)
  produto_tecnico:
    primary: eng_clinica
  engenharia:
    primary: eng_clinica
  certificacoes:
    primary: eng_clinica
    secondary:
      - compras
  bastidores:
    primary: eng_clinica

